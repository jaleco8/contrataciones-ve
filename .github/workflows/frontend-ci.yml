name: Frontend CI

# Ejecutar en push y PRs hacia main/master, solo cuando cambian archivos del frontend
on:
  push:
    branches: [main, master]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  lint-and-build:
    name: Lint y build de Next.js
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Obtener el código fuente
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # Paso 2: Configurar Node.js 20 con caché de npm
      # cache-dependency-path apunta al package-lock.json del frontend
      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # Paso 3: Instalar dependencias con npm ci (instalación limpia y reproducible)
      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      # Paso 4: Ejecutar ESLint sobre el proyecto Next.js
      - name: Lint con ESLint
        working-directory: frontend
        run: npm run lint

      # Paso 5: Compilar el proyecto Next.js en modo producción
      # NEXT_PUBLIC_API_URL apunta a localhost para el build estático
      - name: Build de producción
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_APP_NAME: "Contrataciones VE"
          NEXT_PUBLIC_APP_VERSION: "1.0.0"
        run: npm run build
